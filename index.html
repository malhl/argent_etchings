<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Argent Etchings</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h1>Argent Etchings</h1>
    <p class="subtitle">English to <span class="phyrexian-inline">fyrs</span> &mdash; Live Translation</p>
  </header>

  <div class="ornament">&mdash; &#966; &mdash;</div>

  <div class="output-area">
    <div class="output-section">
      <h2>Phyrexian</h2>
      <div id="phyrexian-output"></div>
    </div>
    <div class="output-section romanization">
      <h2>Romanization</h2>
      <div id="roman-output"></div>
    </div>
  </div>

  <div class="input-area" id="input-area">
    <div class="resize-handle" id="resize-handle"></div>
    <div class="input-wrap">
      <textarea
        id="input-text"
        placeholder="All will be one..."
        autofocus
        spellcheck="false"
      ></textarea>
    </div>
  </div>

  <footer>
    Phyrexian language &mdash; constructed for Magic: The Gathering &bull;
    Font: Horizontal Gibberish by PhieOrDie
  </footer>

  <script src="js/dictionary.js"></script>
  <script src="js/ipa-dictionary.js"></script>
  <script src="js/converter.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
